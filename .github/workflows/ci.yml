name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "cowork-platform[sdk] @ git+https://github.com/suman724/cowork-platform.git@main"
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Typecheck
        run: mypy src/

      - name: Unit tests
        run: pytest -m "unit or not (service or integration)" -x -q

  build:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cowork-workspace-service:ci .
